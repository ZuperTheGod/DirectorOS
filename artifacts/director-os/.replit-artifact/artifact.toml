kind = "web"
previewPath = "/"
title = "DirectorOS"
version = "1.0.0"
id = "artifacts/director-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18785
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/director-os run dev"

[services.env]
PORT = "18785"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/director-os", "run", "build"]
publicDir = "artifacts/director-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
